<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLC Sales Consultation Trainer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f7; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 1rem; }
.sim { width: 100%; max-width: 680px; background: #fff; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 32px rgba(0,0,0,0.12); margin: auto; }
.scene-bg { width: 100%; height: 170px; position: relative; overflow: hidden; display: flex; align-items: flex-end; justify-content: center; }
.scene-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
.scene-overlay { position: absolute; bottom: 0; left: 0; right: 0; height: 60px; background: linear-gradient(to top, #fff, transparent); }
.stage-pill { position: absolute; top: 12px; left: 16px; background: rgba(0,0,0,0.55); color: #fff; font-size: 11px; letter-spacing: 0.05em; text-transform: uppercase; padding: 4px 10px; border-radius: 20px; }
.score-pill { position: absolute; top: 12px; right: 16px; background: rgba(29,158,117,0.9); color: #fff; font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 20px; }
.progress-bar { display: flex; gap: 2px; padding: 6px 16px 0; background: #fff; flex-wrap: wrap; }
.progress-step { flex: 1; min-width: 8px; height: 3px; border-radius: 2px; background: #e5e5e7; transition: background 0.4s; }
.progress-step.done { background: #1D9E75; }
.progress-step.active { background: #185FA5; }
.content-area { padding: 1rem 1.25rem 1.25rem; background: #fff; }
.character-row { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 1rem; }
.avatar { width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; border: 2px solid #e5e5e7; background: #f5f5f7; overflow: hidden; }
.bubble-wrap { flex: 1; }
.speaker-name { font-size: 11px; color: #888; margin-bottom: 4px; letter-spacing: 0.03em; }
.bubble { background: #f5f5f7; border-radius: 0 12px 12px 12px; padding: 0.75rem 1rem; font-size: 14px; line-height: 1.6; color: #1a1a1a; border: 0.5px solid #e5e5e7; }
.prompt { font-size: 13px; color: #666; font-style: italic; margin-bottom: 0.75rem; padding-left: 4px; }
.choices { display: flex; flex-direction: column; gap: 6px; margin-bottom: 0.875rem; }
.choice-btn { background: #fff; border: 1px solid #d1d1d6; border-radius: 10px; padding: 0.75rem 1rem; font-size: 13px; color: #1a1a1a; text-align: left; cursor: pointer; line-height: 1.5; transition: border-color 0.15s, background 0.15s; display: flex; align-items: flex-start; gap: 10px; font-family: inherit; }
.choice-btn:hover:not(:disabled) { background: #f5f5f7; border-color: #aaa; }
.choice-btn:disabled { cursor: default; }
.choice-letter { width: 22px; height: 22px; border-radius: 50%; background: #f0f0f5; color: #666; font-size: 11px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; border: 1px solid #e0e0e5; }
.choice-btn.correct { border-color: #1D9E75; background: #E1F5EE; color: #085041; }
.choice-btn.correct .choice-letter { background: #1D9E75; color: #fff; border-color: #1D9E75; }
.choice-btn.wrong { border-color: #E24B4A; background: #FCEBEB; color: #501313; }
.choice-btn.wrong .choice-letter { background: #E24B4A; color: #fff; border-color: #E24B4A; }
.feedback { border-radius: 10px; padding: 0.75rem 1rem; font-size: 13px; line-height: 1.6; margin-bottom: 0.875rem; display: flex; gap: 10px; align-items: flex-start; }
.feedback.good { background: #E1F5EE; color: #085041; border: 1px solid #5DCAA5; }
.feedback.bad { background: #FCEBEB; color: #501313; border: 1px solid #F09595; }
.feedback-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; font-weight: 700; }
.next-btn { background: #1D9E75; color: #fff; border: none; border-radius: 10px; padding: 0.6rem 1.5rem; font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; font-family: inherit; }
.next-btn:hover { opacity: 0.88; }
.results-wrap { padding: 1.5rem 1.25rem; background: #fff; }
.results-header { text-align: center; margin-bottom: 1.25rem; }
.results-score-big { font-size: 56px; font-weight: 700; color: #1a1a1a; line-height: 1; }
.results-grade { font-size: 16px; font-weight: 600; margin-top: 6px; margin-bottom: 6px; }
.results-msg { font-size: 13px; color: #666; line-height: 1.6; }
.stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 1.25rem 0; }
.stat-box { background: #f5f5f7; border-radius: 10px; padding: 0.875rem; text-align: center; }
.stat-n { font-size: 26px; font-weight: 700; color: #1a1a1a; }
.stat-l { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.04em; margin-top: 2px; }
.btn-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 1rem; }
.btn-outline { background: #fff; border: 1px solid #d1d1d6; border-radius: 10px; padding: 0.6rem 1.5rem; font-size: 13px; color: #1a1a1a; cursor: pointer; font-family: inherit; transition: background 0.15s; }
.btn-outline:hover { background: #f5f5f7; }
.clc-header { background: #0d1b2a; padding: 1rem 1.25rem 0.875rem; display: flex; align-items: center; gap: 12px; }
.clc-logo-text { color: #fff; font-size: 15px; font-weight: 700; letter-spacing: 0.02em; }
.clc-logo-sub { color: #1D9E75; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; margin-top: 1px; }
.clc-badge { background: #1D9E75; color: #fff; font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 20px; letter-spacing: 0.05em; margin-left: auto; }
</style>
</head>

      {text:"\"What negative accounts do you already know about on your report?\"",correct:false}

    good:"You built rapport and got her 'why.' Note what you should NOT do this early: ask what's on their report. Work in phrases like 'you're in the right place' and 'a lot of times people don't need full-blown repair, just some optimization.'",

  {

    prompt:"You just asked if she's getting calls/texts from debt collectors. She said yes. Respond.",

      {text:"\"You should call them back and tell them a law firm is handling it now.\"",correct:false}

    good:"Perfect - the 2025 script leads with this. Whether they say yes or no to collector calls, you tie it to being represented and the FDCPA up-to-$1,000 angle. It turns a stress point into a benefit early.",

  {
    label:"The $1 offer", sceneIdx:1,

      {text:"\"For just $1, I can pull all three of your credit reports and scores. I'll show you exactly what you can do yourself to raise your score - and how many points - plus what I can do on the negative accounts. It takes about 15-20 minutes. Are you ready to do this now?\"",correct:true},
      {text:"\"Let's get your contract signed and then we'll pull everything together.\"",correct:false},
      {text:"\"I'll email you some information and you can decide if you want to move forward.\"",correct:false},
      {text:"\"First I need a credit card on file for the monthly plan.\"",correct:false}
    ],
    good:"Clean: $1 for all three reports, show what THEY can do plus what WE can do, points for both efforts, 15-20 minutes, and the assumptive close 'ready to do this now?' That's the whole pitch in one breath.",
    bad:"The pitch is the $1 report offer: all three reports, what they can do themselves + what we can do, points for both, ~15-20 min, then 'ready to do this now?' Don't jump to contracts or pricing before the report."
  },
  {
    label:"No time right now", sceneIdx:0,
    context:"Maria is interested but slammed for time.",
    prospect:"\"This sounds good but I really can't do 20 minutes right now - I'm about to head into work.\"",
    prompt:"How do you keep it moving?",
    choices:[
      {text:"\"Totally understand. I'll email you a special link that gets you all three reports for $1 - it's unique to me, so don't go straight to the site or you'll pay full price. Create your account, then email me the password you set (your username is your email). Then we'll book a 15-20 minute consult. When's good?\"",correct:true},
      {text:"\"No problem - just go to the website whenever you have time and sign up.\"",correct:false},
      {text:"\"That's fine, I'll call you back another day to try again.\"",correct:false},
      {text:"\"Let me just pull it myself and send you the results later.\"",correct:false}
    ],
    good:"You protected the deal: YOUR unique link (going direct means full price), have them email the password, username is their email, then schedule the consult. This is the exact email fallback - never just send them to the public site.",

  },
  {
    label:"Credit Armor cost", sceneIdx:1,
    context:"She's ready to sign up for Credit Armor and asks about the cost.",
    prospect:"\"So it's really just a dollar? What happens after?\"",
    prompt:"Explain the cost structure.",
    choices:[
      {text:"\"$1 today for all three reports and scores, which starts a 7-day trial. After the trial it's $26.99/month. If you move forward with repair you keep it active while we work your file; if you don't, cancel before the trial ends and you're only out the dollar. What card would you like to use for the $1?\"",correct:true},

  {

    prospect:"\"It says points under ScoreBuilder and points under ScoreBoost - what's the difference?\"",
    prompt:"Explain the two.",
    choices:[

      {text:"\"Don't worry about those numbers - they're just projections.\"",correct:false}

    good:"Right: ScoreBuilder = points from repairing negatives (our work); ScoreBoost = points the client earns themselves on their cards. Keeping them straight drives the whole report review.",

  },

  {
    label:"No revolving credit", sceneIdx:1,

    prompt:"What's the first move?",

      {text:"\"You need an open revolving line, and the fastest way is to get added as an authorized user. Is there someone close to you with an open card and a low balance? They don't give you the card or account access - they just add you, and all their positive payment history gets added to your report.\"",correct:true},

let current=0, score=0, answered=false, selectedIdx=null;
const PROSPECT={name:"Prospect", color:"#7c3aed"};
const COURSE="Sales Consultation Trainer";

function getCorrect(s){return s.choices.findIndex(c=>c.correct);}

function render(){
  const app=document.getElementById('app');
  if(current>=stages.length){renderResults(app);return;}
  const s=stages[current];
  const correct=getCorrect(s);
  const progressHTML=stages.map((_,i)=>{
    const cls=i<current?'done':i===current?'active':'';
    return `<div class="progress-step ${cls}"></div>`;
  }).join('');
  const letters=['A','B','C','D'];
  const choicesHTML=s.choices.map((c,i)=>{
    let cls='';
    if(answered){ if(i===correct)cls='correct'; else if(i===selectedIdx&&i!==correct)cls='wrong'; }
    return `<button class="choice-btn ${cls}" onclick="pick(${i})" ${answered?'disabled':''}><span class="choice-letter">${letters[i]}</span><span>${c.text}</span></button>`;
  }).join('');
  const feedbackHTML=answered?(()=>{
    const good=selectedIdx===correct;
    return `<div class="feedback ${good?'good':'bad'}"><span class="feedback-icon">${good?'✓':'✗'}</span><span><strong>${good?'Correct.':'Not quite.'}</strong> ${good?s.good:s.bad}</span></div>`;
  })():'';
  app.innerHTML=`
    <div class="scene-bg">
      <svg class="scene-svg" viewBox="0 0 700 170" preserveAspectRatio="xMidYMid slice">${SCENES[s.sceneIdx].s}</svg>
      <div class="scene-overlay"></div>
      <div class="stage-pill">Stage ${current+1} / ${stages.length} &middot; ${s.label}</div>
      <div class="score-pill">${score} / ${stages.length}</div>
    </div>
    <div class="progress-bar">${progressHTML}</div>
    <div class="content-area">
      <div class="character-row">
        <div class="avatar"><svg viewBox="0 0 32 32" width="32" height="32" fill="none"><circle cx="16" cy="12" r="6" fill="${PROSPECT.color}" opacity="0.9"/><ellipse cx="16" cy="26" rx="10" ry="6" fill="${PROSPECT.color}" opacity="0.7"/></svg></div>
        <div class="bubble-wrap"><div class="speaker-name">${s.context}</div><div class="bubble">${s.prospect}</div></div>
      </div>
      <div class="prompt">${s.prompt}</div>
      <div class="choices">${choicesHTML}</div>
      ${feedbackHTML}
      ${answered?`<button class="next-btn" onclick="next()">${current<stages.length-1?'Continue →':'See results →'}</button>`:''}
    </div>`;
}

function pick(idx){ if(answered)return; answered=true; selectedIdx=idx; if(idx===getCorrect(stages[current]))score++; render(); }
function next(){ current++; answered=false; selectedIdx=null; render(); }

function postResult(pct){
  try{
    const msg={type:'clc-training-result', course:COURSE, score:score, total:stages.length, percent:pct, passed:pct>=80};
    if(window.parent){ window.parent.postMessage(msg,'*'); }
    window.postMessage(msg,'*');
  }catch(e){}
}

function renderResults(app){
  const pct=Math.round((score/stages.length)*100);
  let grade,gcolor,msg;
  if(pct>=88){grade='Ready to run solo consultations';gcolor='#1D9E75';msg='You know the 2025 script, the objections, and the process. Time to close some deals.';}
  else if(pct>=80){grade='Passed - almost there';gcolor='#185FA5';msg='Solid. Review the stages you missed and run it once more before flying solo.';}
  else if(pct>=50){grade='Needs more practice';gcolor='#BA7517';msg='Shadow a senior rep for a few consultations, then run this again.';}
  else{grade='Keep studying';gcolor='#E24B4A';msg='Read through the full 2025 consultation script and run this again before taking solo calls.';}
  postResult(pct);
  app.innerHTML=`
    <div class="scene-bg">
      <svg class="scene-svg" viewBox="0 0 700 170" preserveAspectRatio="xMidYMid slice"><rect width="100%" height="100%" fill="#0a0a1a"/><circle cx="50%" cy="50%" r="120" fill="#1D9E75" opacity="0.08"/><text x="50%" y="70" text-anchor="middle" fill="#1D9E75" font-size="11" font-family="sans-serif" letter-spacing="3" opacity="0.7">TRAINING COMPLETE</text><text x="50%" y="125" text-anchor="middle" fill="#1D9E75" font-size="52" font-family="sans-serif" font-weight="bold" opacity="0.12">${pct}%</text></svg>
      <div class="scene-overlay"></div>
      <div class="stage-pill">Final Score</div>
      <div class="score-pill">${score} / ${stages.length} correct</div>
    </div>
    <div class="progress-bar">${stages.map(()=>`<div class="progress-step done"></div>`).join('')}</div>
    <div class="results-wrap">
      <div class="results-header">
        <div class="results-score-big">${pct}%</div>
        <div class="results-grade" style="color:${gcolor}">${grade}</div>
        <div class="results-msg">${msg}</div>
      </div>
      <div class="stats-row">
        <div class="stat-box"><div class="stat-n" style="color:#1D9E75">${score}</div><div class="stat-l">Correct</div></div>
        <div class="stat-box"><div class="stat-n" style="color:#E24B4A">${stages.length-score}</div><div class="stat-l">Missed</div></div>
        <div class="stat-box"><div class="stat-n">${stages.length}</div><div class="stat-l">Stages</div></div>
      </div>
      <div class="btn-row"><button class="btn-outline" onclick="restart()">Try again</button></div>
    </div>`;
}

function restart(){ current=0; score=0; answered=false; selectedIdx=null; render(); }
render();
</script>
